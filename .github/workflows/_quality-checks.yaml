name: Quality Checks
permissions:
  contents: read

on:
  workflow_call:

jobs:

  linting:
    uses: ./.github/workflows/_node_job.yaml
    with:
      name: 🧹  Linting
      run: pnpm lint

  typeCheck:
    uses: ./.github/workflows/_node_job.yaml
    with:
      name: 🔍  Type Check
      run: pnpm typecheck

  unusedDependencies:
    uses: ./.github/workflows/_node_job.yaml
    with:
      name: 📦  Unused Dependencies Check
      run: pnpm dlx knip --include dependencies
